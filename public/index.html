<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Management System</title>
    <meta name="description" content="A premium and beautiful dashboard for managing school students and teachers.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar Navigation -->
        <aside class="sidebar glass-panel">
            <div class="logo">
                <div class="logo-icon"></div>
                <h2>EduManage</h2>
            </div>
            <nav>
                <button class="nav-btn active" data-target="dashboard">Dashboard</button>
                <button class="nav-btn" data-target="students">Students</button>
                <button class="nav-btn" data-target="teachers">Teachers</button>
                <button class="nav-btn logout-btn" id="logout-btn" style="margin-top: auto; color: #f87171;">Logout</button>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="header">
                <h1>Welcome Back, Admin</h1>
                <p>Here is your school's quick overview today.</p>
            </header>

            <div id="content-area" class="content-container glass-panel">
                <!-- Content injected here by app.js -->
                <div class="loading">Loading...</div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="app.js"></script>
</body>
</html>
